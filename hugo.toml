baseURL = "https://kliuev.dev/"
locale = "en"
defaultContentLanguage = "en"

enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[pagination]
  pagerSize = 10

[module]
  [[module.imports]]
    path = "github.com/nunocoracao/blowfish/v2"

[languages.en]
  label = "English"
  title = "Viacheslav Kliuev"
  weight = 1

  [languages.en.params]
    displayName = "EN"
    description = "Software engineer building with Go. Writing about backend, infrastructure, and side projects."
    author.name = "Viacheslav Kliuev"
    author.headline = "Software Engineer"
    author.image = "img/author.svg"
    author.bio = "Building with Go. Writing about backend, infrastructure, and side projects."
    author.links = [
      { github = "https://github.com/slavkluev" },
      { email = "mailto:hi@kliuev.dev" },
    ]

[[languages.en.menus.main]]
  name = "Blog"
  pageRef = "blog"
  weight = 10

[[languages.en.menus.main]]
  name = "Projects"
  pageRef = "projects"
  weight = 20

[languages.ru]
  label = "Русский"
  title = "Вячеслав Клюев"
  weight = 2

  [languages.ru.params]
    displayName = "RU"
    description = "Software Engineer, пишу на Go. Рассказываю о бэкенде, инфраструктуре и пет-проектах."
    author.name = "Вячеслав Клюев"
    author.headline = "Software Engineer"
    author.image = "img/author.svg"
    author.bio = "Пишу на Go. Рассказываю о бэкенде, инфраструктуре и пет-проектах."
    author.links = [
      { github = "https://github.com/slavkluev" },
      { email = "mailto:hi@kliuev.dev" },
    ]

[[languages.ru.menus.main]]
  name = "Блог"
  pageRef = "blog"
  weight = 10

[[languages.ru.menus.main]]
  name = "Проекты"
  pageRef = "projects"
  weight = 20


[params]
  colorScheme = "blowfish"
  defaultAppearance = "dark"
  autoSwitchAppearance = true

  enableSearch = true
  enableCodeCopy = true

  [params.homepage]
    layout = "profile"
    showRecent = false

  [params.article]
    showDate = true
    showReadingTime = true
    showTableOfContents = true

  [params.footer]
    showThemeAttribution = false

  [params.list]
    showCards = false
    groupByYear = true

[permalinks]
  [permalinks.page]
    blog = "/blog/:slug/"

[markup.highlight]
  noClasses = false
  lineNos = true

[markup.goldmark.renderer]
  unsafe = true